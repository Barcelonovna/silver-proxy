<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сильвер · Тренды</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<style>
  :root {
    --bg:#0f0e0b; --bg2:#1a1810; --bg3:#141209;
    --gold:#d4af37; --gold-dim:#a0936a; --gold-faint:rgba(212,175,55,0.08);
    --text:#e8dfc8; --text-dim:#4a4535; --border:rgba(212,175,55,0.13);
    --green:#4ade80; --red:#f87171;
    --green-bg:rgba(74,222,128,0.12); --red-bg:rgba(248,113,113,0.12);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Georgia','Times New Roman',serif; height:100vh; overflow:hidden; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  @keyframes kpiIn { from { opacity:0; transform:translateY(10px) scale(.97); } to { opacity:1; transform:none; } }

  .header { background:linear-gradient(135deg,#1c1a0e 0%,#0f0e0b 70%); border-bottom:1px solid var(--border); padding:12px 20px 0; flex-shrink:0; }
  .header-row1 { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .logo { font-size:14px; letter-spacing:3px; color:var(--gold); }
  .year-btns { display:flex; gap:4px; }
  .ybtn { background:none; border:none; color:var(--gold-dim); font-family:inherit; font-size:13px; cursor:pointer; padding:3px 9px; border-bottom:2px solid transparent; transition:all .18s; }
  .ybtn.on { color:var(--gold); border-bottom-color:var(--gold); }
  .header-row2 { display:flex; align-items:baseline; gap:12px; margin-bottom:6px; }
  .header-title { font-size:17px; font-weight:400; color:var(--text); letter-spacing:.3px; }
  .header-sub { font-size:11px; color:var(--gold-dim); letter-spacing:.4px; }

  .shop-bar { display:flex; gap:4px; flex-wrap:wrap; padding-bottom:10px; }
  .sbtn { background:none; border:1px solid var(--border); color:#5a5040; font-family:inherit; font-size:10px; cursor:pointer; padding:3px 8px; border-radius:3px; transition:all .15s; white-space:nowrap; }
  .sbtn:hover { color:var(--gold-dim); border-color:rgba(212,175,55,0.3); }
  .sbtn.on { background:rgba(212,175,55,0.1); border-color:rgba(212,175,55,0.5); color:var(--gold); }
  .sbtn-all { border-style:dashed; }

  .month-bar { display:flex; gap:0; border-top:1px solid var(--border); }
  .mbtn { background:none; border:none; border-bottom:2px solid transparent; color:#5a5040; font-family:inherit; font-size:11px; cursor:pointer; padding:5px 9px; transition:all .15s; white-space:nowrap; }
  .mbtn:hover { color:var(--gold-dim); }
  .mbtn.on { color:var(--gold); border-bottom-color:var(--gold); }

  .layout { display:flex; flex:1; overflow:hidden; min-height:0; }

  .left-panel { width:188px; min-width:188px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
  .lp-head { padding:8px 12px 6px; font-size:9px; letter-spacing:.12em; color:var(--gold-dim); text-transform:uppercase; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .lp-head button { background:none; border:none; color:#5a5040; cursor:pointer; font-size:10px; font-family:inherit; transition:color .15s; }
  .lp-head button:hover { color:var(--gold); }
  .lp-search { padding:5px 8px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .lp-search input { width:100%; background:rgba(212,175,55,0.04); border:1px solid var(--border); color:var(--text); font-family:inherit; font-size:11px; padding:4px 8px; border-radius:3px; outline:none; }
  .lp-search input:focus { border-color:rgba(212,175,55,0.35); }
  .lp-list { overflow-y:auto; flex:1; }
  .coll-item { display:flex; align-items:center; gap:6px; padding:4px 10px; cursor:pointer; transition:background .12s; }
  .coll-item:hover { background:var(--gold-faint); }
  .coll-item input[type=checkbox] { accent-color:var(--gold); cursor:pointer; flex-shrink:0; width:12px; height:12px; }
  .coll-item label { font-size:11px; color:var(--text); cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .coll-item.excluded label { color:#3d3828; text-decoration:line-through; }
  .block-btn { background:none; border:none; cursor:pointer; font-size:12px; padding:0 1px; flex-shrink:0; line-height:1; }
  .lp-empty { padding:16px; color:#444; font-size:11px; text-align:center; }

  .center { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:12px; min-width:0; }

  .kpi-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; animation:kpiIn .35s ease; }
  .kpi-card { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:12px 16px 10px; position:relative; overflow:hidden; }
  .kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, var(--card-accent,var(--gold)) 0%, transparent 100%); }
  .kpi-label { font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:6px; }
  .kpi-main { font-size:22px; font-weight:400; color:var(--text); line-height:1; margin-bottom:5px; letter-spacing:-.3px; }
  .kpi-sub { display:flex; align-items:center; gap:8px; }
  .kpi-prev { font-size:11px; color:#5a5040; }
  .kpi-badge { font-size:11px; font-weight:700; border-radius:4px; padding:2px 7px; }
  .kpi-badge.pos { color:var(--green); background:var(--green-bg); }
  .kpi-badge.neg { color:var(--red); background:var(--red-bg); }
  .kpi-badge.neu { color:#5a5040; background:rgba(90,80,64,0.12); }

  .chart-section { background:var(--bg2); border:1px solid var(--border); border-radius:6px; overflow:hidden; animation:fadeIn .25s ease; flex-shrink:0; }
  .cs-head { display:flex; align-items:center; justify-content:space-between; padding:8px 14px 6px; border-bottom:1px solid var(--border); }
  .cs-title { font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--gold-dim); }
  .cs-legend { display:flex; gap:10px; }
  .cs-legend-item { display:flex; align-items:center; gap:4px; font-size:10px; }

  .sync-tooltip { background:#18160f; border:1px solid rgba(212,175,55,0.25); border-radius:5px; padding:8px 12px; min-width:150px; font-size:11px; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
  .st-month { font-size:10px; color:var(--gold-dim); letter-spacing:.05em; margin-bottom:6px; border-bottom:1px solid var(--border); padding-bottom:4px; }
  .st-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:2px 0; border-radius:3px; }
  .st-row.cur { background:rgba(212,175,55,0.06); padding:2px 4px; margin:0 -4px; }
  .st-year { display:flex; align-items:center; gap:5px; }
  .st-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .st-val { font-weight:600; color:var(--text); }

  .right-panel { width:175px; min-width:175px; background:var(--bg2); border-left:1px solid var(--border); overflow-y:auto; flex-shrink:0; }
  .rp-section { border-bottom:1px solid var(--border); padding:8px 0 6px; }
  .rp-label { font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--gold-dim); padding:0 10px 5px; }
  .rp-row { display:flex; align-items:center; padding:3px 8px; gap:4px; }
  .rp-badge { font-size:10px; font-weight:700; color:#fff; border-radius:3px; padding:2px 5px; min-width:34px; text-align:center; flex-shrink:0; }
  .rp-val { font-size:11px; color:var(--text); flex:1; text-align:right; }
  .rp-pct { font-size:10px; font-weight:700; border-radius:3px; padding:1px 4px; flex-shrink:0; }
  .rp-pct.pos { color:var(--green); background:var(--green-bg); }
  .rp-pct.neg { color:var(--red); background:var(--red-bg); }

  .y2022{background:#4169e1;} .y2023{background:#c0392b;} .y2024{background:#27ae60;} .y2025{background:#b8860b;} .y2026{background:#333;border:1px solid #666;}

  .footer { background:var(--bg2); border-top:1px solid var(--border); padding:6px 20px; display:flex; align-items:center; justify-content:space-between; font-size:10px; color:var(--text-dim); letter-spacing:.5px; flex-shrink:0; }
  .footer button { background:none; border:1px solid rgba(212,175,55,0.18); color:#5a5040; font-family:inherit; font-size:10px; cursor:pointer; padding:3px 10px; border-radius:3px; transition:all .15s; }
  .footer button:hover { border-color:var(--gold); color:var(--gold); }

  .spinner-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; height:160px; gap:10px; }
  .spinner { width:30px; height:30px; border-radius:50%; border:2px solid rgba(212,175,55,0.12); border-top:2px solid var(--gold); animation:spin .85s linear infinite; }

  .login-bg { height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-box { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:40px; width:330px; }
  .login-logo { text-align:center; font-size:18px; letter-spacing:4px; color:var(--gold); margin-bottom:6px; }
  .login-sub { text-align:center; font-size:11px; color:var(--gold-dim); margin-bottom:26px; letter-spacing:1px; }
  .login-input { width:100%; background:rgba(212,175,55,0.04); border:1px solid var(--border); color:var(--text); font-family:inherit; font-size:14px; padding:10px 14px; border-radius:4px; margin-bottom:10px; outline:none; }
  .login-input:focus { border-color:rgba(212,175,55,0.4); }
  .login-btn { width:100%; background:rgba(212,175,55,0.13); border:1px solid var(--gold); color:var(--gold); font-family:inherit; font-size:14px; padding:10px; border-radius:4px; cursor:pointer; letter-spacing:1px; transition:all .2s; }
  .login-btn:hover { background:rgba(212,175,55,0.22); }
  .login-err { color:var(--red); font-size:12px; text-align:center; margin-top:8px; }

  .lp-list::-webkit-scrollbar, .center::-webkit-scrollbar, .right-panel::-webkit-scrollbar { width:3px; }
  .lp-list::-webkit-scrollbar-thumb, .center::-webkit-scrollbar-thumb, .right-panel::-webkit-scrollbar-thumb { background:rgba(212,175,55,0.15); border-radius:2px; }

  .no-data { text-align:center; color:#3d3828; font-size:12px; padding:50px 20px; }
  .err-bar { color:var(--red); font-size:11px; padding:6px 10px; background:rgba(248,113,113,0.07); border-radius:4px; border:1px solid rgba(248,113,113,0.15); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const PROXY_URL = "https://silver-proxy.vercel.app/api/query";
const AUTH_URL  = "https://silver-proxy.vercel.app/api/auth";
const EXCLUDE   = "warehouseName NOT IN ('ИМ-курьеры', 'Склад ОЗОН', 'ИМ-отгрузка')";

const YEARS = [2022,2023,2024,2025,2026];
const YEAR_COLORS = {2022:'#5b7fe8', 2023:'#e05555', 2024:'#3cb371', 2025:'#d4af37', 2026:'#aaaaaa'};
const MONTHS_SHORT = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const SHOPS = ['Аэропорт','БУМ','Варшавский','Дружба','Дружба ИМ','Европейский','Калейдоскоп','Калужский','Колумбус','Ладья','Речной','Щёлковский'];

async function queryDB(sql) {
  const r = await fetch(PROXY_URL, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sql})});
  const j = await r.json();
  if (j.error) throw new Error(j.error);
  return j.data || [];
}

const fmt = n => {
  if (n==null||isNaN(n)||n===0) return '—';
  if (Math.abs(n)>=1e9) return (n/1e9).toFixed(1).replace('.',',')+' МЛД ₽';
  if (Math.abs(n)>=1e6) return (n/1e6).toFixed(1).replace('.',',')+' М ₽';
  if (Math.abs(n)>=1e3) return Math.round(n/1e3)+'К ₽';
  return Math.round(n)+' ₽';
};
const fmtNum = n => (n==null||isNaN(n)) ? '—' : Math.round(n).toLocaleString('ru');
const fmtPrice = n => (n==null||isNaN(n)||n===0) ? '—' : Math.round(n).toLocaleString('ru')+' ₽';
const calcPct = (cur, prev) => {
  if (!cur || !prev || prev===0) return null;
  return Math.round((cur-prev)/prev*100);
};

// ── Login ──────────────────────────────────────────────────────
function LoginScreen({onLogin}) {
  const [login,setLogin]=useState(''), [pass,setPass]=useState('');
  const [err,setErr]=useState(''), [loading,setLoading]=useState(false);
  const submit = async () => {
    setLoading(true); setErr('');
    try {
      const r = await fetch(AUTH_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,password:pass})});
      const j = await r.json();
      if (j.ok) { sessionStorage.setItem('silver_auth','1'); onLogin(); }
      else setErr('Неверный логин или пароль');
    } catch { setErr('Ошибка соединения'); }
    setLoading(false);
  };
  return (
    <div className="login-bg">
      <div className="login-box">
        <div className="login-logo">СИЛЬВЕР</div>
        <div className="login-sub">АНАЛИТИКА · ТРЕНДЫ</div>
        <input className="login-input" placeholder="Логин" value={login} onChange={e=>setLogin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
        <input className="login-input" placeholder="Пароль" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
        <button className="login-btn" onClick={submit} disabled={loading}>{loading?'Вход...':'ВОЙТИ'}</button>
        {err&&<div className="login-err">{err}</div>}
      </div>
    </div>
  );
}

// ── KPI Card ───────────────────────────────────────────────────
function KpiCard({label, value, prevValue, prevYear, fmtFn, accentColor}) {
  const pct = calcPct(value, prevValue);
  const cls = pct==null ? 'neu' : pct>=0 ? 'pos' : 'neg';
  return (
    <div className="kpi-card" style={{'--card-accent': accentColor||'var(--gold)'}}>
      <div className="kpi-label">{label}</div>
      <div className="kpi-main">{fmtFn(value)}</div>
      <div className="kpi-sub">
        {prevValue!=null && <span className="kpi-prev">{prevYear}: {fmtFn(prevValue)}</span>}
        {pct!=null && <span className={`kpi-badge ${cls}`}>{pct>0?'+':''}{pct}%</span>}
      </div>
    </div>
  );
}

// ── Synced Tooltip ─────────────────────────────────────────────
function SyncTooltip({active, payload, label, fmtFn, currentYear}) {
  if (!active||!payload||!payload.length) return null;
  const sorted = [...payload].filter(p=>p.value!=null).sort((a,b)=>(b.value||0)-(a.value||0));
  return (
    <div className="sync-tooltip">
      <div className="st-month">{label}</div>
      {sorted.map(p=>{
        const yr = parseInt(p.name);
        const isCur = yr===currentYear;
        return (
          <div key={p.name} className={`st-row${isCur?' cur':''}`}>
            <div className="st-year">
              <div className="st-dot" style={{background:p.color}}/>
              <span style={{color:isCur?'var(--gold)':'#6a5e48', fontWeight:isCur?600:400}}>{yr}</span>
            </div>
            <span className="st-val" style={{color:isCur?'var(--text)':'#8a7a60'}}>{fmtFn(p.value)}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── Dashboard ──────────────────────────────────────────────────
function Dashboard() {
  const NOW = useRef(new Date()).current;
  const CUR_YEAR = NOW.getFullYear();
  const [selectedYear, setSelectedYear] = useState(CUR_YEAR);
  const [selectedMonth, setSelectedMonth] = useState(null);
  const [selectedShops, setSelectedShops] = useState(new Set(SHOPS));
  const [allCollections, setAllCollections] = useState([]);
  const [selectedCollections, setSelectedCollections] = useState(new Set());
  const [blockedCollections, setBlockedCollections] = useState(new Set());
  const [collSearch, setCollSearch] = useState('');
  const [rawData, setRawData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  useEffect(()=>{
    queryDB(`SELECT DISTINCT collectionArticle FROM sales WHERE ${EXCLUDE} AND collectionArticle IS NOT NULL AND collectionArticle!='' ORDER BY collectionArticle`)
      .then(rows=>{
        const cols = rows.map(r=>r.collectionArticle).filter(Boolean);
        setAllCollections(cols);
        setSelectedCollections(new Set(cols));
      }).catch(()=>{});
  },[]);

  useEffect(()=>{
    const shops = [...selectedShops];
    const cols  = [...selectedCollections].filter(c=>!blockedCollections.has(c));
    if (!shops.length||!cols.length) { setRawData({}); return; }
    let cancelled = false;
    (async()=>{
      setLoading(true); setError('');
      try {
        const shopList = shops.map(s=>`'${s.replace(/'/g,"''")}'`).join(',');
        const colList  = cols.map(c=>`'${c.replace(/'/g,"''")}'`).join(',');
        const moCond   = selectedMonth!=null ? `AND MONTH(docDate)=${selectedMonth+1}` : '';
        const results  = await Promise.all(YEARS.map(yr=>queryDB(`
          SELECT ${yr} AS yr, MONTH(docDate) AS mo, SUM(sum) AS revenue, SUM(quantity) AS qty
          FROM sales WHERE YEAR(docDate)=${yr} ${moCond}
            AND ${EXCLUDE}
            AND warehouseName IN (${shopList})
            AND collectionArticle IN (${colList})
          GROUP BY MONTH(docDate) ORDER BY MONTH(docDate)
        `)));
        if (cancelled) return;
        const merged={};
        for(let i=1;i<=12;i++) merged[i]={};
        results.forEach((rows,yi)=>{
          const yr=YEARS[yi];
          rows.forEach(r=>{ merged[r.mo][yr]={revenue:Number(r.revenue)||0, qty:Number(r.qty)||0}; });
        });
        setRawData(merged);
      } catch(e){ if(!cancelled) setError(e.message); }
      if(!cancelled) setLoading(false);
    })();
    return ()=>{ cancelled=true; };
  },[selectedMonth, selectedShops, selectedCollections, blockedCollections]);

  const chartData = useMemo(()=>{
    if(!rawData) return [];
    const n = selectedMonth!=null ? selectedMonth+1 : 12;
    return Array.from({length:n},(_,i)=>{
      const mo=i+1, row={name:MONTHS_SHORT[i]};
      YEARS.forEach(yr=>{
        const d=rawData[mo]?.[yr];
        row[`${yr}_rev`]   = d?.revenue ?? null;
        row[`${yr}_qty`]   = d?.qty ?? null;
        row[`${yr}_price`] = (d?.revenue&&d?.qty) ? d.revenue/d.qty : null;
      });
      return row;
    });
  },[rawData, selectedMonth]);

  const totals = useMemo(()=>{
    if(!rawData) return {};
    const months = selectedMonth!=null ? [selectedMonth+1] : Array.from({length:12},(_,i)=>i+1);
    const t={};
    YEARS.forEach(yr=>{
      let rev=0,qty=0;
      months.forEach(mo=>{ const d=rawData[mo]?.[yr]; if(d){rev+=d.revenue;qty+=d.qty;} });
      t[yr]={revenue:rev||null, qty:qty||null, price:qty?rev/qty:null};
    });
    return t;
  },[rawData, selectedMonth]);

  const activeCols = useMemo(()=>[...selectedCollections].filter(c=>!blockedCollections.has(c)),[selectedCollections,blockedCollections]);
  const filteredColls = useMemo(()=>allCollections.filter(c=>!collSearch||c.toLowerCase().includes(collSearch.toLowerCase())),[allCollections,collSearch]);

  const toggleShop = s=>{const ns=new Set(selectedShops);ns.has(s)?ns.delete(s):ns.add(s);setSelectedShops(ns);};
  const toggleColl = c=>{const ns=new Set(selectedCollections);ns.has(c)?ns.delete(c):ns.add(c);setSelectedCollections(ns);};
  const toggleBlocked = c=>{const ns=new Set(blockedCollections);ns.has(c)?ns.delete(c):ns.add(c);setBlockedCollections(ns);};

  const kpiPrev = selectedYear-1;
  const kpiCur  = totals[selectedYear]||{};
  const kpiPrevD= totals[kpiPrev]||{};

  const periodLabel = selectedMonth!=null ? `${MONTHS[selectedMonth]} ${selectedYear}` : `${selectedYear} · все месяцы`;

  const {ComposedChart, Line, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer} = Recharts;

  const Legend = () => (
    <div className="cs-legend">
      {YEARS.map(yr=>{
        const isCur = yr===selectedYear;
        return (
          <div className="cs-legend-item" key={yr}>
            <div style={{width:isCur?22:16, height:isCur?3:1.5, borderRadius:2, background:YEAR_COLORS[yr], opacity:isCur?1:0.5}}/>
            <span style={{color:isCur?YEAR_COLORS[yr]:'#5a5040', fontWeight:isCur?600:400}}>{yr}</span>
          </div>
        );
      })}
    </div>
  );

  const renderChart = (metric, fmtFn, tickFmt, title) => (
    <div className="chart-section">
      <div className="cs-head">
        <span className="cs-title">{title}</span>
        <Legend/>
      </div>
      <div style={{padding:'6px 4px 2px'}}>
        {loading ? (
          <div className="spinner-wrap"><div className="spinner"/><span style={{color:'#a0936a',fontSize:11}}>Загрузка...</span></div>
        ) : !chartData.length ? (
          <div className="no-data">Нет данных</div>
        ) : (
          <ResponsiveContainer width="100%" height={185}>
            <ComposedChart data={chartData} margin={{top:4,right:12,left:2,bottom:2}}>
              <defs>
                {YEARS.map(yr=>(
                  <linearGradient key={yr} id={`g_${yr}_${metric}`} x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={YEAR_COLORS[yr]} stopOpacity={yr===selectedYear?0.2:0}/>
                    <stop offset="100%" stopColor={YEAR_COLORS[yr]} stopOpacity={0}/>
                  </linearGradient>
                ))}
              </defs>
              <CartesianGrid strokeDasharray="2 5" stroke="rgba(212,175,55,0.055)" vertical={false}/>
              <XAxis dataKey="name" tick={{fontSize:10,fill:'#5a5040'}} tickLine={false} axisLine={false}/>
              <YAxis tick={{fontSize:9,fill:'#5a5040'}} tickLine={false} axisLine={false} tickFormatter={tickFmt} width={42}/>
              <Tooltip
                content={<SyncTooltip fmtFn={fmtFn} currentYear={selectedYear}/>}
                cursor={{stroke:'rgba(212,175,55,0.12)',strokeWidth:1,strokeDasharray:'2 4'}}
              />
              {YEARS.map(yr => {
                const isCur = yr===selectedYear;
                if (isCur) return (
                  <Area key={yr} type="monotone"
                    dataKey={`${yr}_${metric}`} name={String(yr)}
                    stroke={YEAR_COLORS[yr]} strokeWidth={2.5}
                    fill={`url(#g_${yr}_${metric})`}
                    dot={false} activeDot={{r:4, fill:YEAR_COLORS[yr], stroke:'#0f0e0b', strokeWidth:2}}
                    connectNulls={false}
                  />
                );
                return (
                  <Line key={yr} type="monotone"
                    dataKey={`${yr}_${metric}`} name={String(yr)}
                    stroke={YEAR_COLORS[yr]} strokeWidth={1.2} strokeOpacity={0.4}
                    dot={false} activeDot={{r:3}}
                    connectNulls={false}
                  />
                );
              })}
            </ComposedChart>
          </ResponsiveContainer>
        )}
      </div>
    </div>
  );

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>

      {/* HEADER */}
      <div className="header">
        <div className="header-row1">
          <div className="logo">СИЛЬВЕР ◆ АНАЛИТИКА ПРОДАЖ</div>
          <div className="year-btns">
            {YEARS.map(y=><button key={y} className={`ybtn${selectedYear===y?' on':''}`} onClick={()=>setSelectedYear(y)}>{y}</button>)}
          </div>
        </div>
        <div className="header-row2">
          <div className="header-title">Тренды год к году</div>
          <div className="header-sub">{periodLabel} · {activeCols.length} кол. · {selectedShops.size} маг.</div>
        </div>
        <div className="shop-bar">
          <button className={`sbtn sbtn-all${selectedShops.size===SHOPS.length?' on':''}`}
            onClick={()=>setSelectedShops(selectedShops.size===SHOPS.length?new Set():new Set(SHOPS))}>
            {selectedShops.size===SHOPS.length?'◆ Все':'Все'}
          </button>
          {SHOPS.map(s=><button key={s} className={`sbtn${selectedShops.has(s)?' on':''}`} onClick={()=>toggleShop(s)}>{s}</button>)}
        </div>
        <div className="month-bar">
          <button className={`mbtn${selectedMonth===null?' on':''}`} onClick={()=>setSelectedMonth(null)}>Все месяцы</button>
          {MONTHS.map((m,i)=>(
            <button key={i} className={`mbtn${selectedMonth===i?' on':''}`} onClick={()=>setSelectedMonth(selectedMonth===i?null:i)}>{m}</button>
          ))}
        </div>
      </div>

      {/* LAYOUT */}
      <div className="layout">

        {/* LEFT — Collections */}
        <div className="left-panel">
          <div className="lp-head">
            <span>Коллекции ({activeCols.length})</span>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setSelectedCollections(new Set(allCollections))}>Все</button>
              <button onClick={()=>setSelectedCollections(new Set())}>Сброс</button>
            </div>
          </div>
          <div className="lp-search">
            <input placeholder="Поиск..." value={collSearch} onChange={e=>setCollSearch(e.target.value)}/>
          </div>
          <div className="lp-list">
            {allCollections.length===0 && <div className="lp-empty">Загрузка...</div>}
            {filteredColls.map(c=>{
              const blocked=blockedCollections.has(c), sel=selectedCollections.has(c);
              return (
                <div key={c} className={`coll-item${blocked?' excluded':''}`} title={c}>
                  <input type="checkbox" id={`c_${c}`} checked={sel&&!blocked} onChange={()=>toggleColl(c)} disabled={blocked}/>
                  <label htmlFor={`c_${c}`}>{c}</label>
                  <button className="block-btn" title={blocked?'Снять блокировку':'Заблокировать'}
                    onClick={()=>toggleBlocked(c)} style={{color:blocked?'#f87171':'#2e2b22'}}>
                    {blocked?'✕':'⊘'}
                  </button>
                </div>
              );
            })}
          </div>
        </div>

        {/* CENTER */}
        <div className="center">
          {error && <div className="err-bar">{error}</div>}

          {/* KPI Row */}
          <div className="kpi-row">
            <KpiCard label={`Выручка ${selectedYear}`} value={kpiCur.revenue} prevValue={kpiPrevD.revenue} prevYear={kpiPrev} fmtFn={fmt} accentColor={YEAR_COLORS[selectedYear]}/>
            <KpiCard label={`Количество ${selectedYear}`} value={kpiCur.qty} prevValue={kpiPrevD.qty} prevYear={kpiPrev}
              fmtFn={n=>n==null?'—':Math.round(n).toLocaleString('ru')+' шт'} accentColor={YEAR_COLORS[selectedYear]}/>
            <KpiCard label={`Средняя цена ${selectedYear}`} value={kpiCur.price} prevValue={kpiPrevD.price} prevYear={kpiPrev} fmtFn={fmtPrice} accentColor={YEAR_COLORS[selectedYear]}/>
          </div>

          {renderChart('rev',   fmt,      v=>v>=1e6?(v/1e6).toFixed(0)+'М':v>=1e3?(v/1e3).toFixed(0)+'К':v, 'ВЫРУЧКА')}
          {renderChart('qty',   n=>fmtNum(n)+' шт', v=>v>=1e3?(v/1e3).toFixed(0)+'К':v, 'КОЛИЧЕСТВО')}
          {renderChart('price', fmtPrice, v=>v>=1e3?(v/1e3).toFixed(0)+'К':v, 'СРЕДНЯЯ ЦЕНА')}
        </div>

        {/* RIGHT — Totals + % YoY */}
        <div className="right-panel">
          {[
            {key:'revenue', label:'Выручка', fn:fmt},
            {key:'qty',     label:'Количество', fn:n=>n==null?'—':Math.round(n).toLocaleString('ru')},
            {key:'price',   label:'Ср. цена', fn:fmtPrice},
          ].map(({key,label,fn})=>(
            <div className="rp-section" key={key}>
              <div className="rp-label">{label}</div>
              {YEARS.map((yr,yi)=>{
                const cur  = totals[yr]?.[key];
                const prev = yi>0 ? totals[YEARS[yi-1]]?.[key] : null;
                const pct  = calcPct(cur,prev);
                const cls  = pct==null?'':pct>=0?'pos':'neg';
                return (
                  <div className="rp-row" key={yr}>
                    <span className={`rp-badge y${yr}`}>{yr}</span>
                    <span className="rp-val">{fn(cur)}</span>
                    {pct!=null && <span className={`rp-pct ${cls}`}>{pct>0?'+':''}{pct}%</span>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {/* FOOTER */}
      <div className="footer">
        <span>СИЛЬВЕР · ТРЕНДЫ · {NOW.toLocaleDateString('ru',{day:'2-digit',month:'2-digit',year:'numeric'})}</span>
        <button onClick={()=>{sessionStorage.removeItem('silver_auth');window.location.reload();}}>Выйти</button>
      </div>
    </div>
  );
}

function App() {
  const [auth,setAuth] = useState(!!sessionStorage.getItem('silver_auth'));
  if (!auth) return <LoginScreen onLogin={()=>setAuth(true)}/>;
  return <Dashboard/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
