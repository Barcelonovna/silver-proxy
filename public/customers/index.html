<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Сильвер · Покупатели</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg:#0f0e0b; --bg2:#1a1810;
  --gold:#d4af37; --gold-dim:#a0936a;
  --text:#e8dfc8; --text-dim:#4a4535;
  --border:rgba(212,175,55,0.15);
  --green:#4ade80; --red:#f87171;
  --amber:#fbbf24; --purple:#c084fc; --blue:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Georgia','Times New Roman',serif;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.hdr{background:linear-gradient(135deg,#1a1608 0%,#0f0e0b 60%);border-bottom:1px solid var(--border);padding:18px 28px 0;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-brand{font-size:13px;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.hdr-title{font-size:22px;font-weight:400;letter-spacing:1px;margin-bottom:3px}
.hdr-sub{font-size:12px;color:var(--gold-dim);letter-spacing:.5px;margin-bottom:12px}
.hdr-tabs{display:flex;gap:4px}
.tbtn{background:none;border:none;color:var(--gold-dim);font-family:inherit;font-size:12px;letter-spacing:.5px;cursor:pointer;padding:8px 16px;border-radius:6px 6px 0 0;transition:all .2s;text-transform:uppercase}
.tbtn.on{background:var(--gold);color:#0f0e0b;font-weight:700}
.tbtn:hover:not(.on){color:var(--text);background:rgba(212,175,55,0.08)}

.content{padding:24px 28px;animation:fadeIn .3s ease}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
.card-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold-dim);margin-bottom:8px}
.card-value{font-size:26px;font-weight:400;letter-spacing:.5px}
.card-sub{font-size:12px;color:var(--gold-dim);margin-top:4px}
.card-accent{border-top:2px solid var(--gold)}

.sec{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dim);margin:22px 0 12px;padding-bottom:7px;border-bottom:1px solid var(--border)}

.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px}
.tbl-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.tbl-head h3{font-size:13px;font-weight:400;letter-spacing:.5px;color:var(--gold);flex-shrink:0}
.tbl-head span{font-size:11px;color:var(--gold-dim)}
table{width:100%;border-collapse:collapse}
th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold-dim);padding:9px 13px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child{text-align:left}
td{font-size:13px;padding:9px 13px;text-align:right;border-bottom:1px solid rgba(212,175,55,0.05);color:var(--text)}
td:first-child{text-align:left;color:var(--gold-dim)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(212,175,55,0.03)}
.sortable{cursor:pointer;user-select:none}
.sortable:hover{color:var(--text)}
.sortable.asc::after{content:" ▲";font-size:9px}
.sortable.desc::after{content:" ▼";font-size:9px}

.two{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
@media(max-width:860px){.two{grid-template-columns:1fr}}

.info{background:rgba(212,175,55,0.06);border:1px solid rgba(212,175,55,0.18);border-radius:8px;padding:13px 16px;font-size:12px;color:var(--gold-dim);line-height:1.7;margin-bottom:18px}
.info strong{color:var(--gold)}

.seg-btn{background:none;border:1px solid var(--border);color:var(--gold-dim);font-family:inherit;font-size:12px;cursor:pointer;padding:5px 13px;border-radius:20px;transition:all .2s;margin:3px}
.seg-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(212,175,55,0.08)}
.seg-btn:hover:not(.on){border-color:var(--gold-dim);color:var(--text)}

.export-btn{background:var(--gold);color:#0f0e0b;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:7px 16px;border-radius:6px;letter-spacing:.5px}
.export-btn:hover{background:#c9a832}
.export-btn.outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}
.export-btn.outline:hover{background:rgba(212,175,55,0.1)}

.phone-list{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:11px;color:var(--gold-dim);max-height:140px;overflow-y:auto;font-family:monospace;line-height:1.9;word-break:break-all;margin-top:10px}

.footer{background:var(--bg2);border-top:1px solid var(--border);padding:12px 28px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-dim);letter-spacing:.5px;margin-top:40px}
.logout-btn{background:none;border:1px solid var(--border);color:var(--gold-dim);font-family:inherit;font-size:11px;cursor:pointer;padding:4px 12px;border-radius:4px}
.logout-btn:hover{color:var(--text);border-color:var(--gold-dim)}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#1a1608 0%,#0f0e0b 70%)}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:40px 44px;width:340px;text-align:center}
.login-logo{font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:24px}
.login-title{font-size:20px;font-weight:400;margin-bottom:6px}
.login-sub{font-size:12px;color:var(--gold-dim);margin-bottom:28px}
.login-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:14px;padding:10px 14px;border-radius:6px;margin-bottom:10px;outline:none}
.login-input:focus{border-color:var(--gold)}
.login-btn{width:100%;background:var(--gold);border:none;color:#0f0e0b;font-family:inherit;font-size:13px;font-weight:700;padding:11px;border-radius:6px;cursor:pointer;letter-spacing:1px;margin-top:6px}
.login-btn:hover{background:#c9a832}
.login-err{color:var(--red);font-size:12px;margin-top:8px}

.err{color:var(--red);padding:16px;font-size:13px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:8px;margin:20px;line-height:1.6}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useMemo} = React;

const PROXY = "https://silver-proxy.vercel.app/api/query";
const AUTH  = "https://silver-proxy.vercel.app/api/auth";
const EXCL  = "warehouseName NOT IN ('ИМ-курьеры','Склад ОЗОН','ИМ-отгрузка')";

const fmt  = n => (n==null||n===''||isNaN(Number(n))) ? '—' : Number(n).toLocaleString('ru-RU');
const fmtR = n => (n==null||n===''||isNaN(Number(n))) ? '—' : Number(n).toLocaleString('ru-RU',{maximumFractionDigits:0})+'₽';
const now  = new Date();

async function q(sql) {
  let text = '';
  try {
    const r = await fetch(PROXY, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sql})
    });
    text = await r.text();
    const d = JSON.parse(text);
    if (d.error) throw new Error(d.error);
    return d.data || [];
  } catch(e) {
    if(e instanceof SyntaxError) throw new Error('Сервер вернул не JSON: ' + text.slice(0,100));
    throw e;
  }
}

function Spinner({text='Загрузка...'}) {
  return <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:260,gap:14}}>
    <div style={{width:40,height:40,borderRadius:'50%',border:'3px solid rgba(212,175,55,0.15)',borderTop:'3px solid #d4af37',animation:'spin 0.85s linear infinite'}}/>
    <span style={{color:'#a0936a',fontSize:13,letterSpacing:1}}>{text}</span>
  </div>;
}

function useSortable(data, defKey, defDir='desc') {
  const [k,setK]=useState(defKey);
  const [d,setD]=useState(defDir);
  const sorted=useMemo(()=>{
    if(!k||!data||!data.length) return data||[];
    return [...data].sort((a,b)=>{
      const av=a[k], bv=b[k];
      if(av==null) return 1; if(bv==null) return -1;
      const cmp = typeof av==='string' ? av.localeCompare(bv,'ru') : Number(av)-Number(bv);
      return d==='asc'?cmp:-cmp;
    });
  },[data,k,d]);
  const toggle=key=>{if(k===key)setD(x=>x==='asc'?'desc':'asc');else{setK(key);setD('desc');}};
  const thP=key=>({className:`sortable${k===key?' '+d:''}`,onClick:()=>toggle(key)});
  return {sorted,thP};
}

function LoginScreen({onLogin}) {
  const [login,setLogin]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const submit=async()=>{
    setLoading(true); setErr('');
    try {
      const r=await fetch(AUTH,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,password:pass})});
      const d=await r.json();
      if(d.ok){sessionStorage.setItem('silver_auth','1');onLogin();}
      else setErr('Неверный логин или пароль');
    } catch{ setErr('Ошибка соединения'); }
    setLoading(false);
  };
  return <div className="login-wrap">
    <div className="login-box">
      <div className="login-logo">Сильвер ◆ Аналитика</div>
      <div className="login-title">Вход в систему</div>
      <div className="login-sub">Аналитика покупателей</div>
      <input className="login-input" placeholder="Логин" value={login} onChange={e=>setLogin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
      <input className="login-input" type="password" placeholder="Пароль" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
      <button className="login-btn" onClick={submit} disabled={loading}>{loading?'Вход...':'Войти'}</button>
      {err&&<div className="login-err">{err}</div>}
    </div>
  </div>;
}

/* ══════ TAB 1: ОБЗОР ══════ */
function TabOverview() {
  const [st, setSt] = useState({loading:true,err:'',d:null});

  useEffect(()=>{
    (async()=>{
      try {
        setSt(s=>({...s,loading:true,err:''}));

        // Простые независимые запросы — без тяжёлых подзапросов
        const totalCards = await q(`SELECT COUNT(*) as n FROM loyaltyCards`);

        const byPhone = await q(`
          SELECT clientPhone,
            COUNT(DISTINCT docID) as all_v,
            SUM(CASE WHEN price > 1 THEN 1 ELSE 0 END) as real_rows,
            SUM(CASE WHEN price <= 1 AND price > 0 THEN 1 ELSE 0 END) as gift_rows,
            SUM(CASE WHEN price > 1 THEN sum ELSE 0 END) as rev
          FROM sales
          WHERE ${EXCL} AND clientPhone IS NOT NULL AND clientPhone != ''
          GROUP BY clientPhone
          LIMIT 50000
        `);

        // Фильтруем только тех, у кого есть карта — делаем в JS, чтобы не грузить базу
        const cards = await q(`SELECT clientPhone FROM loyaltyCards`);
        const cardSet = new Set(cards.map(r=>r.clientPhone));
        const withCard = byPhone.filter(r=>cardSet.has(r.clientPhone));

        const buyers    = withCard.filter(r=>Number(r.real_rows)>0).length;
        const giftOnly  = withCard.filter(r=>Number(r.real_rows)===0 && Number(r.gift_rows)>0).length;
        const giftAny   = withCard.filter(r=>Number(r.gift_rows)>0).length;
        const giftThenBuy = withCard.filter(r=>Number(r.gift_rows)>0 && Number(r.real_rows)>0).length;
        const convRate  = giftAny>0?(giftThenBuy/giftAny*100).toFixed(1):0;

        // Магазины
        const shops = await q(`
          SELECT warehouseName,
                 COUNT(DISTINCT clientPhone) as buyers,
                 ROUND(AVG(CASE WHEN price>1 THEN price END)) as avg_price
          FROM sales
          WHERE ${EXCL} AND clientPhone IS NOT NULL AND clientPhone != ''
          GROUP BY warehouseName ORDER BY buyers DESC
        `);

        // Коллекции (без heavy join)
        const cols = await q(`
          SELECT collectionArticle as col,
                 COUNT(DISTINCT clientPhone) as buyers,
                 ROUND(SUM(sum)) as revenue
          FROM sales
          WHERE ${EXCL} AND price>1
            AND collectionArticle IS NOT NULL AND collectionArticle != ''
          GROUP BY collectionArticle
          ORDER BY revenue DESC LIMIT 12
        `);

        // Динамика по месяцам
        const monthly = await q(`
          SELECT DATE_FORMAT(docDate,'%Y-%m') as ym,
                 COUNT(DISTINCT CASE WHEN price>1 THEN clientPhone END) as buyers,
                 COUNT(DISTINCT CASE WHEN price<=1 AND price>0 THEN clientPhone END) as gifters,
                 ROUND(SUM(CASE WHEN price>1 THEN sum ELSE 0 END)) as revenue
          FROM sales
          WHERE ${EXCL} AND docDate >= DATE_SUB(CURDATE(), INTERVAL 12 MONTH)
          GROUP BY ym ORDER BY ym
        `);

        // Пол
        const genders = await q(`
          SELECT gender, COUNT(*) as cnt
          FROM loyaltyCards
          WHERE gender IS NOT NULL AND gender != ''
          GROUP BY gender ORDER BY cnt DESC
        `);

        // Распределение частоты (в JS)
        const freqMap = {};
        withCard.forEach(r => {
          const rv = Number(r.real_rows)||0;
          let g, ord;
          if(rv===0)      { g='0 — только подарки'; ord=0; }
          else if(rv===1) { g='1 покупка';           ord=1; }
          else if(rv===2) { g='2 покупки';           ord=2; }
          else if(rv<=5)  { g='3–5 покупок';         ord=3; }
          else if(rv<=10) { g='6–10 покупок';        ord=4; }
          else            { g='11+ покупок';          ord=5; }
          if(!freqMap[g]) freqMap[g]={label:g,cnt:0,rev:0,ord};
          freqMap[g].cnt++;
          freqMap[g].rev += Number(r.rev)||0;
        });
        const freqDist = Object.values(freqMap).sort((a,b)=>a.ord-b.ord);

        setSt({loading:false,err:'',d:{
          totalCards:Number(totalCards[0].n),
          buyers,giftOnly,giftAny,giftThenBuy,convRate,
          freqDist,shops,collections:cols,monthly,genders
        }});
      } catch(e) {
        setSt({loading:false,err:e.message,d:null});
      }
    })();
  },[]);

  if(st.loading) return <Spinner text="Загружаем аналитику покупателей..."/>;
  if(st.err) return <div className="err">Ошибка загрузки:<br/><code>{st.err}</code></div>;
  const {totalCards,buyers,giftOnly,giftAny,giftThenBuy,convRate,freqDist,shops,collections,monthly,genders}=st.d;

  return <div className="content">
    <div className="cards">
      <div className="card card-accent">
        <div className="card-label">Карт лояльности</div>
        <div className="card-value">{fmt(totalCards)}</div>
        <div className="card-sub">уникальных телефонов</div>
      </div>
      <div className="card">
        <div className="card-label">Покупали хоть раз</div>
        <div className="card-value">{fmt(buyers)}</div>
        <div className="card-sub">{totalCards>0?Math.round(buyers/totalCards*100):0}% от всех карт</div>
      </div>
      <div className="card">
        <div className="card-label">Только подарки</div>
        <div className="card-value" style={{color:'var(--red)'}}>{fmt(giftOnly)}</div>
        <div className="card-sub">ни одной реальной покупки</div>
      </div>
      <div className="card">
        <div className="card-label">Получили подарок</div>
        <div className="card-value">{fmt(giftAny)}</div>
        <div className="card-sub">из них купили: {fmt(giftThenBuy)}</div>
      </div>
      <div className="card">
        <div className="card-label">Конверсия халявщиков</div>
        <div className="card-value" style={{color:'var(--green)'}}>{convRate}%</div>
        <div className="card-sub">взяли подарок → потом купили</div>
      </div>
    </div>

    <div className="info">
      <strong>Ключевой факт:</strong> из <strong>{fmt(giftAny)}</strong> получивших подарок — 
      купили потом <strong>{fmt(giftThenBuy)}</strong> ({convRate}%). 
      Чистых «халявщиков»: <strong>{fmt(giftOnly)}</strong>.
    </div>

    <div className="sec">Распределение по числу покупок</div>
    <div className="tbl-wrap">
      <div className="tbl-head"><h3>Клиенты с картой лояльности</h3></div>
      <table>
        <thead><tr>
          <th style={{textAlign:'left'}}>Группа</th>
          <th>Клиентов</th><th>Доля</th><th>Суммарная выручка</th>
        </tr></thead>
        <tbody>{freqDist.map((r,i)=>{
          const tot=freqDist.reduce((a,x)=>a+x.cnt,0);
          return <tr key={i}>
            <td>{r.label}</td>
            <td>{fmt(r.cnt)}</td>
            <td>{tot>0?Math.round(r.cnt/tot*100):0}%</td>
            <td>{r.rev>0?fmtR(r.rev):'—'}</td>
          </tr>;
        })}</tbody>
      </table>
    </div>

    <div className="two">
      <div className="tbl-wrap">
        <div className="tbl-head"><h3>Покупатели по магазинам</h3></div>
        <table>
          <thead><tr><th style={{textAlign:'left'}}>Магазин</th><th>Покупателей</th><th>Ср. цена</th></tr></thead>
          <tbody>{shops.map((r,i)=><tr key={i}><td>{r.warehouseName}</td><td>{fmt(r.buyers)}</td><td>{fmtR(r.avg_price)}</td></tr>)}</tbody>
        </table>
      </div>
      <div className="tbl-wrap">
        <div className="tbl-head"><h3>По полу</h3></div>
        <table>
          <thead><tr><th style={{textAlign:'left'}}>Пол</th><th>Клиентов</th><th>Доля</th></tr></thead>
          <tbody>{genders.map((r,i)=>{
            const tot=genders.reduce((a,x)=>a+Number(x.cnt),0);
            return <tr key={i}><td>{r.gender}</td><td>{fmt(r.cnt)}</td><td>{tot>0?Math.round(r.cnt/tot*100):0}%</td></tr>;
          })}</tbody>
        </table>
      </div>
    </div>

    <div className="tbl-wrap">
      <div className="tbl-head"><h3>Топ коллекций</h3><span>по выручке</span></div>
      <table>
        <thead><tr><th style={{textAlign:'left'}}>Коллекция</th><th>Покупателей</th><th>Выручка</th></tr></thead>
        <tbody>{collections.map((r,i)=><tr key={i}><td>{r.col||'—'}</td><td>{fmt(r.buyers)}</td><td>{fmtR(r.revenue)}</td></tr>)}</tbody>
      </table>
    </div>

    <div className="sec">Динамика последних 12 месяцев</div>
    <div className="tbl-wrap">
      <div className="tbl-head"><h3>Активность клиентов</h3></div>
      <table>
        <thead><tr><th style={{textAlign:'left'}}>Месяц</th><th>Покупателей</th><th>Взяли подарок</th><th>Выручка</th></tr></thead>
        <tbody>{monthly.map((r,i)=><tr key={i}><td>{r.ym}</td><td>{fmt(r.buyers)}</td><td>{fmt(r.gifters)}</td><td>{fmtR(r.revenue)}</td></tr>)}</tbody>
      </table>
    </div>
  </div>;
}

/* ══════ TAB 2: RFM ══════ */
function TabRFM() {
  const [rows,setRows]=useState([]);
  const [cardRows,setCardRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState('');
  const [search,setSearch]=useState('');
  const [selSeg,setSelSeg]=useState('all');

  useEffect(()=>{
    (async()=>{
      try {
        setLoading(true);
        // Берём данные продаж по телефонам
        const sales = await q(`
          SELECT clientPhone,
            DATEDIFF(CURDATE(), MAX(CASE WHEN price>1 THEN docDate END)) as recency,
            COUNT(DISTINCT CASE WHEN price>1 THEN docID END) as freq,
            ROUND(SUM(CASE WHEN price>1 THEN sum ELSE 0 END)) as monetary,
            COUNT(DISTINCT CASE WHEN price<=1 AND price>0 THEN docID END) as gifts
          FROM sales
          WHERE ${EXCL} AND clientPhone IS NOT NULL AND clientPhone != ''
          GROUP BY clientPhone
          ORDER BY monetary DESC
          LIMIT 5000
        `);
        // Список карточников
        const cards = await q(`SELECT clientPhone FROM loyaltyCards`);
        const cardSet = new Set(cards.map(r=>r.clientPhone));
        const filtered = sales.filter(r=>cardSet.has(r.clientPhone));

        const withSeg = filtered.map(r=>{
          const f=Number(r.freq)||0, rc=Number(r.recency)||9999, g=Number(r.gifts)||0;
          let seg;
          if(f>=5 && rc<=90)       seg='VIP';
          else if(f>=3 && rc<=180) seg='Лояльный';
          else if(f>=1 && rc<=180) seg='Активный';
          else if(f>=1 && rc<=365) seg='Спящий';
          else if(f>=1 && rc>365)  seg='Потерянный';
          else if(f===0 && g>0)    seg='Только подарки';
          else                     seg='Нет покупок';
          return {...r,seg,f,rc,g};
        });
        setRows(withSeg);
      } catch(e){ setErr(e.message); }
      setLoading(false);
    })();
  },[]);

  const SEG_C={'VIP':'#fbbf24','Лояльный':'#4ade80','Активный':'#a3e635','Спящий':'#60a5fa','Потерянный':'#f87171','Только подарки':'#f87171','Нет покупок':'#a0936a'};

  const segSum=useMemo(()=>{
    const m={};
    rows.forEach(r=>{if(!m[r.seg])m[r.seg]={seg:r.seg,cnt:0,rev:0};m[r.seg].cnt++;m[r.seg].rev+=Number(r.monetary)||0;});
    return Object.values(m).sort((a,b)=>b.cnt-a.cnt);
  },[rows]);

  const filt=useMemo(()=>{
    let d=rows;
    if(selSeg!=='all') d=d.filter(r=>r.seg===selSeg);
    if(search) d=d.filter(r=>(r.clientPhone||'').includes(search));
    return d;
  },[rows,selSeg,search]);

  const {sorted,thP}=useSortable(filt,'monetary');

  if(loading) return <Spinner text="Строим RFM-сегменты..."/>;
  if(err) return <div className="err">Ошибка:<br/><code>{err}</code></div>;

  return <div className="content">
    <div className="info">
      <strong>RFM:</strong> <strong>R</strong> — дней с последней покупки · <strong>F</strong> — число покупок · <strong>M</strong> — сумма. Подарки (≤1₽) отдельно.
    </div>
    <div className="cards">
      {segSum.map((s,i)=><div key={i} className="card" style={{cursor:'pointer',borderColor:selSeg===s.seg?'var(--gold)':'var(--border)'}} onClick={()=>setSelSeg(selSeg===s.seg?'all':s.seg)}>
        <div className="card-label" style={{color:SEG_C[s.seg]||'var(--gold-dim)'}}>{s.seg}</div>
        <div className="card-value">{fmt(s.cnt)}</div>
        <div className="card-sub">{fmtR(s.rev)}</div>
      </div>)}
    </div>
    <div className="tbl-wrap">
      <div className="tbl-head">
        <h3>{selSeg==='all'?'Все':selSeg} — {fmt(filt.length)} чел.</h3>
        <input style={{background:'var(--bg)',border:'1px solid var(--border)',color:'var(--text)',fontFamily:'inherit',fontSize:12,padding:'4px 10px',borderRadius:4,outline:'none',width:180}}
          placeholder="Поиск по телефону..." value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <div style={{padding:'7px 12px',borderBottom:'1px solid var(--border)',display:'flex',flexWrap:'wrap',gap:3}}>
        <button className={`seg-btn${selSeg==='all'?' on':''}`} onClick={()=>setSelSeg('all')}>Все ({fmt(rows.length)})</button>
        {segSum.map(s=><button key={s.seg} className={`seg-btn${selSeg===s.seg?' on':''}`} onClick={()=>setSelSeg(selSeg===s.seg?'all':s.seg)} style={{color:selSeg===s.seg?'':SEG_C[s.seg]}}>{s.seg} ({fmt(s.cnt)})</button>)}
      </div>
      <table>
        <thead><tr>
          <th style={{textAlign:'left'}}>Телефон</th>
          <th style={{textAlign:'left'}}>Сегмент</th>
          <th {...thP('freq')}>Покупок</th>
          <th {...thP('monetary')}>Выручка</th>
          <th {...thP('recency')}>Дней без покупки</th>
          <th {...thP('gifts')}>Подарков</th>
        </tr></thead>
        <tbody>{sorted.slice(0,300).map((r,i)=><tr key={i}>
          <td style={{fontFamily:'monospace',fontSize:11}}>{r.clientPhone}</td>
          <td><span style={{color:SEG_C[r.seg]||'var(--gold-dim)',fontSize:12}}>{r.seg}</span></td>
          <td>{fmt(r.freq)}</td>
          <td>{fmtR(r.monetary)}</td>
          <td style={{color:Number(r.recency)>365?'var(--red)':Number(r.recency)>120?'var(--amber)':'var(--text)'}}>{r.recency??'—'}</td>
          <td style={{color:Number(r.gifts)>5?'var(--red)':'var(--text)'}}>{r.gifts||0}</td>
        </tr>)}</tbody>
      </table>
      {sorted.length>300&&<div style={{padding:'9px 14px',fontSize:12,color:'var(--gold-dim)',borderTop:'1px solid var(--border)'}}>Показано 300 из {fmt(sorted.length)}. Используйте поиск.</div>}
    </div>
  </div>;
}

/* ══════ TAB 3: SMS ══════ */
function TabSMS() {
  const [st,setSt]=useState({loading:true,err:'',rows:[],smsTotal:0});
  const [selSeg,setSelSeg]=useState('all');
  const [copied,setCopied]=useState(false);

  useEffect(()=>{
    (async()=>{
      try {
        setSt(s=>({...s,loading:true,err:''}));

        const sales = await q(`
          SELECT clientPhone,
            COUNT(DISTINCT CASE WHEN price>1 THEN docID END) as rv,
            COUNT(DISTINCT CASE WHEN price<=1 AND price>0 THEN docID END) as gv,
            ROUND(SUM(CASE WHEN price>1 THEN sum ELSE 0 END)) as rev,
            DATEDIFF(CURDATE(), MAX(CASE WHEN price>1 THEN docDate END)) as dsb
          FROM sales
          WHERE ${EXCL} AND clientPhone IS NOT NULL AND clientPhone != ''
          GROUP BY clientPhone
          LIMIT 50000
        `);

        const cards = await q(`SELECT clientPhone FROM loyaltyCards`);
        const cardSet = new Set(cards.map(r=>r.clientPhone));
        const cardSales = sales.filter(r=>cardSet.has(r.clientPhone));

        const sms = await q(`SELECT phone, COUNT(*) as cnt FROM SendingSMS WHERE phone IS NOT NULL AND phone!='' GROUP BY phone`);
        const smsMap={};
        sms.forEach(r=>{smsMap[r.phone]=Number(r.cnt)||0;});

        const rows = cardSales.map(r=>{
          const rv=Number(r.rv)||0, gv=Number(r.gv)||0, rev=Number(r.rev)||0;
          const dsb=Number(r.dsb)||9999;
          const smsCnt=smsMap[r.clientPhone]||0;
          const smsCost=smsCnt*8, giftCost=gv*120;
          const totalCost=smsCost+giftCost;
          const roi=totalCost>0?Math.round((rev-totalCost)/totalCost*100):null;

          let seg,rec;
          if(rv>=5&&dsb<=90)              {seg='vip';       rec='✅ Слать';}
          else if(rv>=2&&dsb<=180)        {seg='loyal';      rec='✅ Слать';}
          else if(rv===1&&dsb<=180)       {seg='new';        rec='✅ Слать';}
          else if(rv>=1&&dsb<=365)        {seg='sleeping';   rec='⚠️ Попробовать';}
          else if(rv>=1&&dsb>365)         {seg='lost';       rec='⛔ Пауза';}
          else if(rv===0&&gv>0&&smsCnt>=5){seg='freeloader'; rec='⛔ Исключить';}
          else if(rv===0&&gv>0)           {seg='gift_new';   rec='⚠️ Дать шанс';}
          else                            {seg='unknown';    rec='⚠️ Наблюдать';}

          return {...r,rv,gv,rev,dsb,smsCnt,smsCost,giftCost,totalCost,roi,seg,rec};
        });

        setSt({loading:false,err:'',rows,smsTotal:sms.length});
      } catch(e){
        setSt(s=>({...s,loading:false,err:e.message}));
      }
    })();
  },[]);

  const SL={'all':'Все','vip':'VIP','loyal':'Лояльные','new':'Новые','sleeping':'Спящие','lost':'Потерянные','gift_new':'Потенциальные','freeloader':'Халявщики','unknown':'Неизвестные'};
  const SC={vip:'#fbbf24',loyal:'#4ade80',new:'#c084fc',sleeping:'#60a5fa',lost:'#f87171',gift_new:'#fb923c',freeloader:'#f87171',unknown:'#a0936a'};
  const SEND=['vip','loyal','new','sleeping','gift_new'];

  const {rows}=st;
  const segS=useMemo(()=>{const m={};rows.forEach(r=>{if(!m[r.seg])m[r.seg]={cnt:0,rev:0,sms:0};m[r.seg].cnt++;m[r.seg].rev+=r.rev||0;m[r.seg].sms+=r.smsCost||0;});return m;},[rows]);
  const filt=useMemo(()=>selSeg==='all'?rows:rows.filter(r=>r.seg===selSeg),[rows,selSeg]);
  const {sorted,thP}=useSortable(filt,'rev');

  const phones=useMemo(()=>{
    const src=selSeg==='all'?rows.filter(r=>SEND.includes(r.seg)):filt;
    return [...new Set(src.map(r=>r.clientPhone).filter(Boolean))];
  },[rows,filt,selSeg]);

  const sendCnt=rows.filter(r=>SEND.includes(r.seg)).length;
  const exclCnt=rows.filter(r=>['freeloader','lost'].includes(r.seg)).length;

  const copy=()=>{navigator.clipboard.writeText(phones.join('\n'));setCopied(true);setTimeout(()=>setCopied(false),2000);};
  const csv=()=>{
    const src=selSeg==='all'?rows.filter(r=>SEND.includes(r.seg)):filt;
    const b=src.map(r=>`${r.clientPhone},${SL[r.seg]||r.seg},${r.rv},${r.rev},${r.gv},${r.smsCnt},${r.roi??''},${r.rec}`).join('\n');
    const blob=new Blob(['\uFEFFТелефон,Сегмент,Покупок,Выручка,Подарков,SMS,ROI%,Рекомендация\n'+b],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='silver_sms.csv';a.click();
  };

  if(st.loading) return <Spinner text="Анализируем SMS и покупки..."/>;
  if(st.err) return <div className="err">Ошибка:<br/><code>{st.err}</code></div>;

  return <div className="content">
    <div className="cards">
      <div className="card card-accent">
        <div className="card-label">К рассылке</div>
        <div className="card-value" style={{color:'var(--green)'}}>{fmt(sendCnt)}</div>
        <div className="card-sub">VIP + Лояльные + Новые + Спящие + Потенц.</div>
      </div>
      <div className="card">
        <div className="card-label">Исключить</div>
        <div className="card-value" style={{color:'var(--red)'}}>{fmt(exclCnt)}</div>
        <div className="card-sub">халявщики + потерянные</div>
      </div>
      <div className="card">
        <div className="card-label">Экономия за рассылку</div>
        <div className="card-value" style={{color:'var(--green)'}}>{fmtR(exclCnt*8)}</div>
        <div className="card-sub">{fmt(exclCnt)} чел × 8₽</div>
      </div>
      <div className="card">
        <div className="card-label">SMS в истории</div>
        <div className="card-value">{fmt(st.smsTotal)}</div>
        <div className="card-sub">уникальных телефонов</div>
      </div>
    </div>

    <div className="sec">Сегменты — кликните для фильтра</div>
    <div className="cards">
      {Object.entries(SL).filter(([k])=>k!=='all').map(([k,l])=>{
        const s=segS[k]||{cnt:0,rev:0,sms:0};
        if(!s.cnt) return null;
        const isSend=SEND.includes(k);
        return <div key={k} className="card" style={{cursor:'pointer',borderColor:selSeg===k?'var(--gold)':'var(--border)'}} onClick={()=>setSelSeg(selSeg===k?'all':k)}>
          <div className="card-label" style={{color:SC[k]||'var(--gold-dim)'}}>{l}</div>
          <div style={{display:'flex',alignItems:'baseline',gap:8}}>
            <div className="card-value">{fmt(s.cnt)}</div>
            <span style={{fontSize:12,color:isSend?'var(--green)':'var(--red)'}}>{isSend?'✅':'⛔'}</span>
          </div>
          <div className="card-sub">{fmtR(s.rev)} · SMS: {fmtR(s.sms)}</div>
        </div>;
      })}
    </div>

    {/* Экспорт */}
    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:16,marginBottom:18}}>
      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:8}}>
        <span style={{fontSize:13,color:'var(--gold)'}}>Список для рассылки</span>
        <span style={{fontSize:12,color:'var(--gold-dim)'}}>{selSeg==='all'?`Рекомендуемые: ${fmt(phones.length)} чел.`:`${SL[selSeg]}: ${fmt(filt.length)} чел.`}</span>
        <div style={{marginLeft:'auto',display:'flex',gap:8}}>
          <button className="export-btn" onClick={csv}>⬇ CSV</button>
          <button className="export-btn outline" onClick={copy}>{copied?'✓ Скопировано!':'📋 Копировать'}</button>
        </div>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:3,marginBottom:8}}>
        <button className={`seg-btn${selSeg==='all'?' on':''}`} onClick={()=>setSelSeg('all')}>Рекомендуемые ({fmt(sendCnt)})</button>
        {Object.entries(SL).filter(([k])=>k!=='all').map(([k,l])=>{const c=(segS[k]||{}).cnt||0;if(!c)return null;return <button key={k} className={`seg-btn${selSeg===k?' on':''}`} onClick={()=>setSelSeg(selSeg===k?'all':k)}>{l} ({fmt(c)})</button>;})}
      </div>
      <div className="phone-list">
        {phones.length===0?'Нет номеров':phones.slice(0,80).join('  ·  ')+(phones.length>80?`  ...ещё ${phones.length-80}`:'')}
      </div>
    </div>

    <div className="tbl-wrap">
      <div className="tbl-head"><h3>{SL[selSeg]||'Все'} — {fmt(filt.length)} клиентов</h3></div>
      <table>
        <thead><tr>
          <th style={{textAlign:'left'}}>Телефон</th>
          <th style={{textAlign:'left'}}>Сегмент</th>
          <th {...thP('rv')}>Покупок</th>
          <th {...thP('rev')}>Выручка</th>
          <th {...thP('gv')}>Подарков</th>
          <th {...thP('smsCnt')}>SMS</th>
          <th {...thP('roi')}>ROI %</th>
          <th {...thP('dsb')}>Дней без покупки</th>
          <th>Рекомендация</th>
        </tr></thead>
        <tbody>{sorted.slice(0,300).map((r,i)=>{
          const rc=Number(r.roi);
          return <tr key={i}>
            <td style={{fontFamily:'monospace',fontSize:11}}>{r.clientPhone}</td>
            <td><span style={{color:SC[r.seg]||'var(--gold-dim)',fontSize:12}}>{SL[r.seg]||r.seg}</span></td>
            <td>{r.rv}</td>
            <td>{fmtR(r.rev)}</td>
            <td style={{color:r.gv>5?'var(--red)':'var(--text)'}}>{r.gv}</td>
            <td>{r.smsCnt}</td>
            <td style={{color:r.roi==null?'var(--gold-dim)':rc>=0?'var(--green)':'var(--red)',fontWeight:700,fontSize:12}}>{r.roi!=null?r.roi+'%':'—'}</td>
            <td style={{color:Number(r.dsb)>365?'var(--red)':Number(r.dsb)>180?'var(--amber)':'var(--text)'}}>{r.dsb===9999?'—':r.dsb}</td>
            <td style={{fontSize:11}}>{r.rec}</td>
          </tr>;
        })}</tbody>
      </table>
      {sorted.length>300&&<div style={{padding:'9px 14px',fontSize:12,color:'var(--gold-dim)',borderTop:'1px solid var(--border)'}}>Показано 300 из {fmt(sorted.length)}. Скачайте CSV.</div>}
    </div>
  </div>;
}

/* ══════ DASHBOARD ══════ */
function Dashboard() {
  const [tab,setTab]=useState('overview');
  const tabs=[{id:'overview',label:'Обзор & Статистика'},{id:'rfm',label:'RFM-сегменты'},{id:'sms',label:'SMS-оптимизация'}];
  return <>
    <div className="hdr">
      <div className="hdr-top"><div className="hdr-brand">Сильвер ◆ Аналитика продаж</div></div>
      <div className="hdr-title">Аналитика покупателей</div>
      <div className="hdr-sub">Поведение клиентов · RFM-сегментация · Оптимизация SMS-рассылок</div>
      <div className="hdr-tabs">{tabs.map(t=><button key={t.id} className={`tbtn${tab===t.id?' on':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}</div>
    </div>
    {tab==='overview'&&<TabOverview/>}
    {tab==='rfm'&&<TabRFM/>}
    {tab==='sms'&&<TabSMS/>}
    <div className="footer">
      <span>СИЛЬВЕР · ПОКУПАТЕЛИ · {now.toLocaleString('ru-RU')}</span>
      <button className="logout-btn" onClick={()=>{sessionStorage.removeItem('silver_auth');window.location.reload();}}>Выйти</button>
    </div>
  </>;
}

function App() {
  const [auth,setAuth]=useState(!!sessionStorage.getItem('silver_auth'));
  if(!auth) return <LoginScreen onLogin={()=>setAuth(true)}/>;
  return <Dashboard/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
