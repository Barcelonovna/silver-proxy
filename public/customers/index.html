<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Сильвер · Покупатели</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg:#0f0e0b; --bg2:#1a1810;
  --gold:#d4af37; --gold-dim:#a0936a;
  --text:#e8dfc8; --text-dim:#4a4535;
  --border:rgba(212,175,55,0.15);
  --green:#4ade80; --red:#f87171;
  --amber:#fbbf24; --purple:#c084fc; --blue:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Georgia','Times New Roman',serif;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.hdr{background:linear-gradient(135deg,#1a1608 0%,#0f0e0b 60%);border-bottom:1px solid var(--border);padding:18px 28px 0;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.hdr-brand{font-size:13px;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.hdr-title{font-size:22px;font-weight:400;letter-spacing:1px;margin-bottom:3px}
.hdr-sub{font-size:12px;color:var(--gold-dim);letter-spacing:.5px;margin-bottom:12px}
.hdr-tabs{display:flex;gap:4px}
.tbtn{background:none;border:none;color:var(--gold-dim);font-family:inherit;font-size:12px;letter-spacing:.5px;cursor:pointer;padding:8px 16px;border-radius:6px 6px 0 0;transition:all .2s;text-transform:uppercase}
.tbtn.on{background:var(--gold);color:#0f0e0b;font-weight:700}
.tbtn:hover:not(.on){color:var(--text);background:rgba(212,175,55,0.08)}

.content{padding:24px 28px;animation:fadeIn .3s ease}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
.card-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold-dim);margin-bottom:8px}
.card-value{font-size:26px;font-weight:400;letter-spacing:.5px}
.card-sub{font-size:12px;color:var(--gold-dim);margin-top:4px}
.card-accent{border-top:2px solid var(--gold)}

.sec{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dim);margin:22px 0 12px;padding-bottom:7px;border-bottom:1px solid var(--border)}

.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px}
.tbl-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.tbl-head h3{font-size:13px;font-weight:400;letter-spacing:.5px;color:var(--gold)}
.tbl-head span{font-size:11px;color:var(--gold-dim)}
table{width:100%;border-collapse:collapse}
th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold-dim);padding:9px 13px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child{text-align:left}
td{font-size:13px;padding:9px 13px;text-align:right;border-bottom:1px solid rgba(212,175,55,0.05);color:var(--text)}
td:first-child{text-align:left;color:var(--gold-dim)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(212,175,55,0.03)}
.sortable{cursor:pointer;user-select:none}
.sortable:hover{color:var(--text)}
.sortable.asc::after{content:" ▲";font-size:9px}
.sortable.desc::after{content:" ▼";font-size:9px}

.two{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
@media(max-width:860px){.two{grid-template-columns:1fr}}

.info{background:rgba(212,175,55,0.06);border:1px solid rgba(212,175,55,0.18);border-radius:8px;padding:13px 16px;font-size:12px;color:var(--gold-dim);line-height:1.7;margin-bottom:18px}
.info strong{color:var(--gold)}

.seg-btn{background:none;border:1px solid var(--border);color:var(--gold-dim);font-family:inherit;font-size:12px;cursor:pointer;padding:5px 13px;border-radius:20px;transition:all .2s;margin:2px}
.seg-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(212,175,55,0.08)}
.seg-btn:hover:not(.on){border-color:var(--gold-dim);color:var(--text)}

.btn{border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:7px 16px;border-radius:6px;letter-spacing:.5px;transition:all .2s}
.btn-gold{background:var(--gold);color:#0f0e0b}.btn-gold:hover{background:#c9a832}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}.btn-outline:hover{background:rgba(212,175,55,0.1)}
.btn-dim{background:transparent;border:1px solid var(--border);color:var(--gold-dim)}.btn-dim:hover{border-color:var(--gold-dim);color:var(--text)}

.phone-list{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:11px;color:var(--gold-dim);max-height:130px;overflow-y:auto;font-family:monospace;line-height:1.9;word-break:break-all;margin-top:8px}

.footer{background:var(--bg2);border-top:1px solid var(--border);padding:12px 28px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-dim);letter-spacing:.5px;margin-top:40px;flex-wrap:wrap;gap:8px}
.logout-btn{background:none;border:1px solid var(--border);color:var(--gold-dim);font-family:inherit;font-size:11px;cursor:pointer;padding:4px 12px;border-radius:4px}
.logout-btn:hover{color:var(--text);border-color:var(--gold-dim)}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#1a1608 0%,#0f0e0b 70%)}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:40px 44px;width:340px;text-align:center}
.login-logo{font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:24px}
.login-title{font-size:20px;font-weight:400;margin-bottom:6px}
.login-sub{font-size:12px;color:var(--gold-dim);margin-bottom:28px}
.login-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:14px;padding:10px 14px;border-radius:6px;margin-bottom:10px;outline:none}
.login-input:focus{border-color:var(--gold)}
.login-btn{width:100%;background:var(--gold);border:none;color:#0f0e0b;font-family:inherit;font-size:13px;font-weight:700;padding:11px;border-radius:6px;cursor:pointer;letter-spacing:1px;margin-top:6px}
.login-btn:hover{background:#c9a832}
.login-err{color:var(--red);font-size:12px;margin-top:8px}

.err-box{color:var(--red);padding:16px;font-size:13px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:8px;margin:20px;line-height:1.6}

/* Precompute banner */
.precompute-bar{background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.25);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.precompute-bar.running{border-color:rgba(96,165,250,0.4);background:rgba(96,165,250,0.06)}
.precompute-bar.ok{border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.06)}
.precompute-bar.err{border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.06)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useMemo, useCallback} = React;

const BASE    = 'https://silver-proxy.vercel.app';
const AUTH    = BASE + '/api/auth';
const DATA    = BASE + '/api/customers-data';
const PRECOMP = BASE + '/api/precompute';
const SECRET  = 'silver2026';   // ← совпадает с PRECOMPUTE_SECRET в Vercel env

const fmt  = n => (n==null||n===''||isNaN(Number(n)))?'—':Number(n).toLocaleString('ru-RU');
const fmtR = n => (n==null||n===''||isNaN(Number(n)))?'—':Number(n).toLocaleString('ru-RU',{maximumFractionDigits:0})+'₽';
const now  = new Date();

async function getData(type) {
  const r = await fetch(`${DATA}?type=${type}`);
  const text = await r.text();
  try { return JSON.parse(text); }
  catch(e) { throw new Error('Ответ не JSON: ' + text.slice(0,120)); }
}

/* ── Spinner ── */
function Spinner({text='Загрузка...'}) {
  return <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:260,gap:14}}>
    <div style={{width:40,height:40,borderRadius:'50%',border:'3px solid rgba(212,175,55,0.15)',borderTop:'3px solid #d4af37',animation:'spin 0.85s linear infinite'}}/>
    <span style={{color:'#a0936a',fontSize:13,letterSpacing:1}}>{text}</span>
  </div>;
}

/* ── useSortable ── */
function useSortable(data, defKey, defDir='desc') {
  const [k,setK]=useState(defKey);
  const [d,setD]=useState(defDir);
  const sorted=useMemo(()=>{
    if(!k||!data||!data.length) return data||[];
    return [...data].sort((a,b)=>{
      const av=a[k],bv=b[k];
      if(av==null)return 1; if(bv==null)return -1;
      const cmp=typeof av==='string'?av.localeCompare(bv,'ru'):Number(av)-Number(bv);
      return d==='asc'?cmp:-cmp;
    });
  },[data,k,d]);
  const toggle=key=>{if(k===key)setD(x=>x==='asc'?'desc':'asc');else{setK(key);setD('desc');}};
  const thP=key=>({className:`sortable${k===key?' '+d:''}`,onClick:()=>toggle(key)});
  return {sorted,thP};
}

/* ── PrecomputeBar — кнопка пересчёта ── */
function PrecomputeBar({computedAt, onRefresh}) {
  const [st, setSt] = useState('idle'); // idle | running | ok | err
  const [msg, setMsg] = useState('');

  const run = async () => {
    setSt('running'); setMsg('');
    try {
      const r = await fetch(PRECOMP, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({secret: SECRET})
      });
      const d = await r.json();
      if(d.ok) {
        setSt('ok');
        setMsg(`Готово за ${d.elapsed} · ${fmt(d.clients)} клиентов`);
        setTimeout(()=>{ onRefresh(); setSt('idle'); }, 1500);
      } else {
        setSt('err'); setMsg(d.error||'Неизвестная ошибка');
      }
    } catch(e) {
      setSt('err'); setMsg(e.message);
    }
  };

  const cls = st==='idle'?'precompute-bar':st==='running'?'precompute-bar running':st==='ok'?'precompute-bar ok':'precompute-bar err';
  const tsColor = {'idle':'var(--gold-dim)','running':'var(--blue)','ok':'var(--green)','err':'var(--red)'};

  return <div className={cls}>
    <div style={{flex:1,minWidth:200}}>
      <div style={{fontSize:12,color:tsColor[st],fontWeight:700}}>
        {st==='idle' && (computedAt ? '✓ Данные актуальны' : '⚠ Данные не загружены')}
        {st==='running' && '⏳ Пересчёт данных... (30–60 сек)'}
        {st==='ok'    && '✓ ' + msg}
        {st==='err'   && '✗ Ошибка: ' + msg}
      </div>
      {computedAt && st==='idle' && <div style={{fontSize:11,color:'var(--text-dim)',marginTop:3}}>
        Пересчитано: {new Date(computedAt).toLocaleString('ru-RU')}
      </div>}
    </div>
    <button className="btn btn-dim" onClick={run} disabled={st==='running'} style={{flexShrink:0}}>
      {st==='running' ? '⏳ Считаем...' : '↻ Пересчитать данные'}
    </button>
    <div style={{fontSize:11,color:'var(--text-dim)',maxWidth:220}}>
      Запрашивает данные из MySQL и кэширует. Запускайте раз в день или после импорта новых продаж.
    </div>
  </div>;
}

/* ── Login ── */
function LoginScreen({onLogin}) {
  const [login,setLogin]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const submit=async()=>{
    setLoading(true); setErr('');
    try {
      const r=await fetch(AUTH,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,password:pass})});
      const d=await r.json();
      if(d.ok){sessionStorage.setItem('silver_auth','1');onLogin();}
      else setErr('Неверный логин или пароль');
    }catch{setErr('Ошибка соединения');}
    setLoading(false);
  };
  return <div className="login-wrap">
    <div className="login-box">
      <div className="login-logo">Сильвер ◆ Аналитика</div>
      <div className="login-title">Вход в систему</div>
      <div className="login-sub">Аналитика покупателей</div>
      <input className="login-input" placeholder="Логин" value={login} onChange={e=>setLogin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
      <input className="login-input" type="password" placeholder="Пароль" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
      <button className="login-btn" onClick={submit} disabled={loading}>{loading?'Вход...':'Войти'}</button>
      {err&&<div className="login-err">{err}</div>}
    </div>
  </div>;
}

/* ══════ TAB 1: ОБЗОР ══════ */
function TabOverview({refreshKey, onComputedAt}) {
  const [st,setSt]=useState({loading:true,err:'',d:null});

  useEffect(()=>{
    setSt({loading:true,err:'',d:null});
    getData('overview').then(d=>{
      onComputedAt(d.computedAt);
      setSt({loading:false,err:'',d});
    }).catch(e=>setSt({loading:false,err:e.message,d:null}));
  },[refreshKey]);

  if(st.loading) return <Spinner text="Читаем кэш..."/>;
  if(st.err) return <div className="err-box">
    {st.err.includes('No data') || st.err.includes('404')
      ? <><strong>Данные ещё не посчитаны.</strong><br/>Нажмите кнопку «↻ Пересчитать данные» выше — это займёт 30–60 секунд.</>
      : <>Ошибка: {st.err}</>}
  </div>;

  const {totalCards,buyers,giftOnly,giftAny,giftThenBuy,convRate,freqDist,genderDist,shopStats,collectionStats,monthlyStats}=st.d;

  // Сортируем freqDist
  const freqOrder={'0 — только подарки':0,'1 покупка':1,'2 покупки':2,'3–5 покупок':3,'6–10 покупок':4,'11+ покупок':5};
  const freqSorted=[...(freqDist||[])].sort((a,b)=>(freqOrder[a.label]??9)-(freqOrder[b.label]??9));

  return <div className="content">
    <div className="cards">
      <div className="card card-accent">
        <div className="card-label">Карт лояльности</div>
        <div className="card-value">{fmt(totalCards)}</div>
        <div className="card-sub">уникальных телефонов</div>
      </div>
      <div className="card">
        <div className="card-label">Покупали хоть раз</div>
        <div className="card-value">{fmt(buyers)}</div>
        <div className="card-sub">{totalCards>0?Math.round(buyers/totalCards*100):0}% от всех карт</div>
      </div>
      <div className="card">
        <div className="card-label">Только подарки</div>
        <div className="card-value" style={{color:'var(--red)'}}>{fmt(giftOnly)}</div>
        <div className="card-sub">ни одной реальной покупки</div>
      </div>
      <div className="card">
        <div className="card-label">Получили подарок</div>
        <div className="card-value">{fmt(giftAny)}</div>
        <div className="card-sub">из них купили потом: {fmt(giftThenBuy)}</div>
      </div>
      <div className="card">
        <div className="card-label">Конверсия халявщиков</div>
        <div className="card-value" style={{color:'var(--green)'}}>{convRate}%</div>
        <div className="card-sub">взяли подарок → потом купили</div>
      </div>
    </div>

    <div className="info">
      <strong>Ключевой факт:</strong> из <strong>{fmt(giftAny)}</strong> получивших подарок по SMS —
      в итоге совершили покупку <strong>{fmt(giftThenBuy)}</strong> ({convRate}%).
      Чистых «халявщиков»: <strong>{fmt(giftOnly)}</strong>.
    </div>

    <div className="sec">Распределение по числу покупок</div>
    <div className="tbl-wrap">
      <div className="tbl-head"><h3>Клиенты с картой лояльности</h3></div>
      <table>
        <thead><tr>
          <th style={{textAlign:'left'}}>Группа</th>
          <th>Клиентов</th><th>Доля</th><th>Суммарная выручка</th>
        </tr></thead>
        <tbody>{freqSorted.map((r,i)=>{
          const tot=freqSorted.reduce((a,x)=>a+(x.cnt||0),0);
          return <tr key={i}>
            <td>{r.label}</td>
            <td>{fmt(r.cnt)}</td>
            <td>{tot>0?Math.round(r.cnt/tot*100):0}%</td>
            <td>{r.rev>0?fmtR(r.rev):'—'}</td>
          </tr>;
        })}</tbody>
      </table>
    </div>

    <div className="two">
      <div className="tbl-wrap">
        <div className="tbl-head"><h3>Покупатели по магазинам</h3></div>
        <table>
          <thead><tr><th style={{textAlign:'left'}}>Магазин</th><th>Покупателей</th><th>Выручка</th><th>Ср. цена</th></tr></thead>
          <tbody>{(shopStats||[]).map((r,i)=><tr key={i}>
            <td>{r.warehouseName}</td>
            <td>{fmt(r.real_buyers)}</td>
            <td>{fmtR(r.revenue)}</td>
            <td>{fmtR(r.avg_price)}</td>
          </tr>)}</tbody>
        </table>
      </div>
      <div className="tbl-wrap">
        <div className="tbl-head"><h3>По полу</h3><span>покупатели с картой</span></div>
        <table>
          <thead><tr><th style={{textAlign:'left'}}>Пол</th><th>Клиентов</th><th>Доля</th></tr></thead>
          <tbody>{(genderDist||[]).map((r,i)=>{
            const tot=(genderDist||[]).reduce((a,x)=>a+Number(x.cnt),0);
            return <tr key={i}><td>{r.gender}</td><td>{fmt(r.cnt)}</td><td>{tot>0?Math.round(r.cnt/tot*100):0}%</td></tr>;
          })}</tbody>
        </table>
      </div>
    </div>

    <div className="tbl-wrap">
      <div className="tbl-head"><h3>Топ коллекций</h3><span>реальные покупки</span></div>
      <table>
        <thead><tr><th style={{textAlign:'left'}}>Коллекция</th><th>Покупателей</th><th>Кол-во</th><th>Выручка</th></tr></thead>
        <tbody>{(collectionStats||[]).map((r,i)=><tr key={i}>
          <td>{r.collection||'—'}</td>
          <td>{fmt(r.buyers)}</td>
          <td>{fmt(r.qty)}</td>
          <td>{fmtR(r.revenue)}</td>
        </tr>)}</tbody>
      </table>
    </div>

    <div className="sec">Динамика последних 12 месяцев</div>
    <div className="tbl-wrap">
      <div className="tbl-head"><h3>Активность клиентов с картой</h3></div>
      <table>
        <thead><tr><th style={{textAlign:'left'}}>Месяц</th><th>Покупателей</th><th>Взяли подарок</th><th>Чеков</th><th>Выручка</th></tr></thead>
        <tbody>{(monthlyStats||[]).map((r,i)=><tr key={i}>
          <td>{r.ym}</td>
          <td>{fmt(r.buyers)}</td>
          <td>{fmt(r.gifters)}</td>
          <td>{fmt(r.receipts)}</td>
          <td>{fmtR(r.revenue)}</td>
        </tr>)}</tbody>
      </table>
    </div>
  </div>;
}

/* ══════ TAB 2: RFM ══════ */
function TabRFM({refreshKey}) {
  const [clients,setClients]=useState([]);
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState('');
  const [search,setSearch]=useState('');
  const [selSeg,setSelSeg]=useState('all');

  useEffect(()=>{
    setLoading(true); setErr('');
    getData('clients').then(d=>{
      setClients(d.clients||[]);
      setLoading(false);
    }).catch(e=>{setErr(e.message);setLoading(false);});
  },[refreshKey]);

  const SEG_C={'VIP':'#fbbf24','Лояльный':'#4ade80','Активный':'#a3e635','Спящий':'#60a5fa','Потерянный':'#f87171','Халявщик':'#f87171','Потенциальный':'#fb923c','Нет покупок':'#a0936a'};

  const segSum=useMemo(()=>{
    const m={};
    clients.forEach(r=>{
      if(!m[r.seg])m[r.seg]={seg:r.seg,cnt:0,rev:0};
      m[r.seg].cnt++;m[r.seg].rev+=r.rev||0;
    });
    return Object.values(m).sort((a,b)=>b.cnt-a.cnt);
  },[clients]);

  const filt=useMemo(()=>{
    let d=clients;
    if(selSeg!=='all') d=d.filter(r=>r.seg===selSeg);
    if(search) d=d.filter(r=>(r.p||'').includes(search));
    return d;
  },[clients,selSeg,search]);

  const {sorted,thP}=useSortable(filt,'rev');

  if(loading) return <Spinner text="Загружаем клиентов из кэша..."/>;
  if(err) return <div className="err-box">{err.includes('No data')||err.includes('404')?'Данные не посчитаны. Нажмите «Пересчитать данные».':err}</div>;

  return <div className="content">
    <div className="info">
      <strong>RFM:</strong> <strong>R</strong> — дней с последней покупки · <strong>F</strong> — число покупок · <strong>M</strong> — сумма трат. Подарки (≤1₽) считаются отдельно и не входят в покупки.
    </div>
    <div className="cards">
      {segSum.map((s,i)=><div key={i} className="card" style={{cursor:'pointer',borderColor:selSeg===s.seg?'var(--gold)':'var(--border)'}} onClick={()=>setSelSeg(selSeg===s.seg?'all':s.seg)}>
        <div className="card-label" style={{color:SEG_C[s.seg]||'var(--gold-dim)'}}>{s.seg}</div>
        <div className="card-value">{fmt(s.cnt)}</div>
        <div className="card-sub">{fmtR(s.rev)}</div>
      </div>)}
    </div>
    <div className="tbl-wrap">
      <div className="tbl-head">
        <h3>{selSeg==='all'?'Все сегменты':selSeg} — {fmt(filt.length)} чел.</h3>
        <input style={{background:'var(--bg)',border:'1px solid var(--border)',color:'var(--text)',fontFamily:'inherit',fontSize:12,padding:'4px 10px',borderRadius:4,outline:'none',width:180}}
          placeholder="Поиск по телефону..." value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <div style={{padding:'7px 12px',borderBottom:'1px solid var(--border)',display:'flex',flexWrap:'wrap',gap:2}}>
        <button className={`seg-btn${selSeg==='all'?' on':''}`} onClick={()=>setSelSeg('all')}>Все ({fmt(clients.length)})</button>
        {segSum.map(s=><button key={s.seg} className={`seg-btn${selSeg===s.seg?' on':''}`}
          onClick={()=>setSelSeg(selSeg===s.seg?'all':s.seg)}
          style={{color:selSeg===s.seg?'':SEG_C[s.seg]||''}}>
          {s.seg} ({fmt(s.cnt)})
        </button>)}
      </div>
      <table>
        <thead><tr>
          <th style={{textAlign:'left'}}>Телефон</th>
          <th style={{textAlign:'left'}}>Сегмент</th>
          <th {...thP('rv')}>Покупок</th>
          <th {...thP('rev')}>Выручка</th>
          <th {...thP('ap')}>Ср. цена</th>
          <th {...thP('dsb')}>Дней без покупки</th>
          <th {...thP('gv')}>Подарков</th>
          <th>Пол / Возраст</th>
          <th {...thP('sc')}>Магазинов</th>
        </tr></thead>
        <tbody>{sorted.slice(0,300).map((r,i)=><tr key={i}>
          <td style={{fontFamily:'monospace',fontSize:11}}>{r.p}</td>
          <td><span style={{color:SEG_C[r.seg]||'var(--gold-dim)',fontSize:12}}>{r.seg}</span></td>
          <td>{fmt(r.rv)}</td>
          <td>{fmtR(r.rev)}</td>
          <td>{r.ap>0?fmtR(r.ap):'—'}</td>
          <td style={{color:r.dsb>365?'var(--red)':r.dsb>120?'var(--amber)':'var(--text)'}}>{r.dsb??'—'}</td>
          <td style={{color:r.gv>5?'var(--red)':'var(--text)'}}>{r.gv||0}</td>
          <td style={{fontSize:12,color:'var(--gold-dim)'}}>{r.gen||'—'}{r.age>0?' '+r.age+'л':''}</td>
          <td>{r.sc||1}</td>
        </tr>)}</tbody>
      </table>
      {sorted.length>300&&<div style={{padding:'9px 14px',fontSize:12,color:'var(--gold-dim)',borderTop:'1px solid var(--border)'}}>
        Показано 300 из {fmt(sorted.length)}. Используйте поиск или фильтр по сегменту.
      </div>}
    </div>
  </div>;
}

/* ══════ TAB 3: SMS ══════ */
function TabSMS({refreshKey}) {
  const [clients,setClients]=useState([]);
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState('');
  const [selSeg,setSelSeg]=useState('all');
  const [copied,setCopied]=useState(false);

  useEffect(()=>{
    setLoading(true); setErr('');
    getData('clients').then(d=>{
      setClients(d.clients||[]);
      setLoading(false);
    }).catch(e=>{setErr(e.message);setLoading(false);});
  },[refreshKey]);

  const SL={'all':'Все','VIP':'VIP','Лояльный':'Лояльные','Активный':'Активные','Спящий':'Спящие','Потерянный':'Потерянные','Потенциальный':'Потенциальные','Халявщик':'Халявщики','Нет покупок':'Нет покупок'};
  const SC={VIP:'#fbbf24',Лояльный:'#4ade80',Активный:'#a3e635',Спящий:'#60a5fa',Потерянный:'#f87171',Потенциальный:'#fb923c',Халявщик:'#f87171','Нет покупок':'#a0936a'};
  const SEND=['VIP','Лояльный','Активный','Спящий','Потенциальный'];

  const segS=useMemo(()=>{
    const m={};
    clients.forEach(r=>{
      if(!m[r.seg])m[r.seg]={cnt:0,rev:0,smsCost:0};
      m[r.seg].cnt++;m[r.seg].rev+=r.rev||0;m[r.seg].smsCost+=r.sms*8||0;
    });
    return m;
  },[clients]);

  const filt=useMemo(()=>selSeg==='all'?clients:clients.filter(r=>r.seg===selSeg),[clients,selSeg]);
  const {sorted,thP}=useSortable(filt,'rev');

  const phones=useMemo(()=>{
    const src=selSeg==='all'?clients.filter(r=>SEND.includes(r.seg)):filt;
    return [...new Set(src.map(r=>r.p).filter(Boolean))];
  },[clients,filt,selSeg]);

  const sendCnt=clients.filter(r=>SEND.includes(r.seg)).length;
  const exclCnt=clients.filter(r=>['Халявщик','Потерянный'].includes(r.seg)).length;

  const copy=()=>{navigator.clipboard.writeText(phones.join('\n'));setCopied(true);setTimeout(()=>setCopied(false),2000);};

  const csv=()=>{
    const src=selSeg==='all'?clients.filter(r=>SEND.includes(r.seg)):filt;
    const b=src.map(r=>`${r.p},${SL[r.seg]||r.seg},${r.rv},${r.rev},${r.gv},${r.sms},${r.roi??''},${r.smsRec}`).join('\n');
    const blob=new Blob(['\uFEFFТелефон,Сегмент,Покупок,Выручка,Подарков,SMS,ROI%,Рекомендация\n'+b],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='silver_sms.csv';a.click();
  };

  if(loading) return <Spinner text="Загружаем данные из кэша..."/>;
  if(err) return <div className="err-box">{err.includes('No data')||err.includes('404')?'Данные не посчитаны. Нажмите «Пересчитать данные».':err}</div>;

  return <div className="content">
    <div className="cards">
      <div className="card card-accent">
        <div className="card-label">Рекомендуется к рассылке</div>
        <div className="card-value" style={{color:'var(--green)'}}>{fmt(sendCnt)}</div>
        <div className="card-sub">VIP + Лояльные + Активные + Спящие + Потенц.</div>
      </div>
      <div className="card">
        <div className="card-label">Исключить из рассылки</div>
        <div className="card-value" style={{color:'var(--red)'}}>{fmt(exclCnt)}</div>
        <div className="card-sub">халявщики + потерянные</div>
      </div>
      <div className="card">
        <div className="card-label">Экономия за одну рассылку</div>
        <div className="card-value" style={{color:'var(--green)'}}>{fmtR(exclCnt*8)}</div>
        <div className="card-sub">{fmt(exclCnt)} чел × 8₽/SMS</div>
      </div>
      <div className="card">
        <div className="card-label">Всего клиентов в базе</div>
        <div className="card-value">{fmt(clients.length)}</div>
        <div className="card-sub">с картой лояльности</div>
      </div>
    </div>

    <div className="sec">Сегменты — нажмите для фильтрации и экспорта</div>
    <div className="cards">
      {Object.entries(SL).filter(([k])=>k!=='all').map(([k,l])=>{
        const s=segS[k]||{cnt:0,rev:0,smsCost:0};
        if(!s.cnt) return null;
        const isSend=SEND.includes(k);
        return <div key={k} className="card" style={{cursor:'pointer',borderColor:selSeg===k?'var(--gold)':'var(--border)'}} onClick={()=>setSelSeg(selSeg===k?'all':k)}>
          <div className="card-label" style={{color:SC[k]||'var(--gold-dim)'}}>{l}</div>
          <div style={{display:'flex',alignItems:'baseline',gap:8}}>
            <div className="card-value">{fmt(s.cnt)}</div>
            <span style={{fontSize:12,color:isSend?'var(--green)':'var(--red)'}}>{isSend?'✅ слать':'⛔ пауза'}</span>
          </div>
          <div className="card-sub">{fmtR(s.rev)} · SMS: {fmtR(s.smsCost)}</div>
        </div>;
      })}
    </div>

    {/* Экспорт */}
    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:16,marginBottom:18}}>
      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:8}}>
        <span style={{fontSize:13,color:'var(--gold)'}}>Список для рассылки</span>
        <span style={{fontSize:12,color:'var(--gold-dim)'}}>
          {selSeg==='all'?`Рекомендуемые сегменты: ${fmt(phones.length)} номеров`:`${SL[selSeg]}: ${fmt(filt.length)} чел.`}
        </span>
        <div style={{marginLeft:'auto',display:'flex',gap:8}}>
          <button className="btn btn-gold" onClick={csv}>⬇ Скачать CSV</button>
          <button className="btn btn-outline" onClick={copy}>{copied?'✓ Скопировано!':'📋 Копировать номера'}</button>
        </div>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:3,marginBottom:6}}>
        <button className={`seg-btn${selSeg==='all'?' on':''}`} onClick={()=>setSelSeg('all')}>Рекомендуемые ({fmt(sendCnt)})</button>
        {Object.entries(SL).filter(([k])=>k!=='all').map(([k,l])=>{
          const c=(segS[k]||{}).cnt||0; if(!c)return null;
          return <button key={k} className={`seg-btn${selSeg===k?' on':''}`} onClick={()=>setSelSeg(selSeg===k?'all':k)}>{l} ({fmt(c)})</button>;
        })}
      </div>
      <div className="phone-list">
        {phones.length===0?'Нет номеров для выбранного сегмента':phones.slice(0,80).join('  ·  ')+(phones.length>80?`  ...ещё ${phones.length-80}`:'')}
      </div>
    </div>

    <div className="tbl-wrap">
      <div className="tbl-head">
        <h3>{SL[selSeg]||'Все'} — {fmt(filt.length)} клиентов</h3>
        <span>↕ сортировка по столбцам</span>
      </div>
      <table>
        <thead><tr>
          <th style={{textAlign:'left'}}>Телефон</th>
          <th style={{textAlign:'left'}}>Сегмент</th>
          <th {...thP('rv')}>Покупок</th>
          <th {...thP('rev')}>Выручка</th>
          <th {...thP('gv')}>Подарков</th>
          <th {...thP('sms')}>SMS</th>
          <th {...thP('roi')}>ROI %</th>
          <th {...thP('dsb')}>Дней без покупки</th>
          <th>Рекомендация</th>
        </tr></thead>
        <tbody>{sorted.slice(0,300).map((r,i)=>{
          const rc=Number(r.roi);
          const recColor={'send':'var(--green)','exclude':'var(--red)'}[r.smsRec]||'var(--gold-dim)';
          return <tr key={i}>
            <td style={{fontFamily:'monospace',fontSize:11}}>{r.p}</td>
            <td><span style={{color:SC[r.seg]||'var(--gold-dim)',fontSize:12}}>{SL[r.seg]||r.seg}</span></td>
            <td>{r.rv}</td>
            <td>{fmtR(r.rev)}</td>
            <td style={{color:r.gv>5?'var(--red)':'var(--text)'}}>{r.gv||0}</td>
            <td>{r.sms||0}</td>
            <td style={{color:r.roi==null?'var(--gold-dim)':rc>=0?'var(--green)':'var(--red)',fontWeight:700,fontSize:12}}>
              {r.roi!=null?r.roi+'%':'—'}
            </td>
            <td style={{color:Number(r.dsb)>365?'var(--red)':Number(r.dsb)>180?'var(--amber)':'var(--text)'}}>
              {r.dsb??'—'}
            </td>
            <td style={{fontSize:11,color:recColor}}>{r.smsRec==='send'?'✅ слать':'⛔ пауза'}</td>
          </tr>;
        })}</tbody>
      </table>
      {sorted.length>300&&<div style={{padding:'9px 14px',fontSize:12,color:'var(--gold-dim)',borderTop:'1px solid var(--border)'}}>
        Показано 300 из {fmt(sorted.length)}. Скачайте CSV для полного списка.
      </div>}
    </div>
  </div>;
}

/* ══════ DASHBOARD ══════ */
function Dashboard() {
  const [tab,setTab]=useState('overview');
  const [refreshKey,setRefreshKey]=useState(0);
  const [computedAt,setComputedAt]=useState(null);

  const tabs=[
    {id:'overview',label:'Обзор & Статистика'},
    {id:'rfm',label:'RFM-сегменты'},
    {id:'sms',label:'SMS-оптимизация'},
  ];

  const onRefresh=useCallback(()=>setRefreshKey(k=>k+1),[]);

  return <>
    <div className="hdr">
      <div className="hdr-top">
        <div className="hdr-brand">Сильвер ◆ Аналитика продаж</div>
      </div>
      <div className="hdr-title">Аналитика покупателей</div>
      <div className="hdr-sub">Поведение клиентов · RFM-сегментация · Оптимизация SMS-рассылок</div>
      <div className="hdr-tabs">
        {tabs.map(t=><button key={t.id} className={`tbtn${tab===t.id?' on':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>
    </div>

    <div style={{padding:'16px 28px 0'}}>
      <PrecomputeBar computedAt={computedAt} onRefresh={onRefresh}/>
    </div>

    {tab==='overview'&&<TabOverview refreshKey={refreshKey} onComputedAt={setComputedAt}/>}
    {tab==='rfm'    &&<TabRFM refreshKey={refreshKey}/>}
    {tab==='sms'    &&<TabSMS refreshKey={refreshKey}/>}

    <div className="footer">
      <span>СИЛЬВЕР · ПОКУПАТЕЛИ · {now.toLocaleString('ru-RU')}</span>
      <button className="logout-btn" onClick={()=>{sessionStorage.removeItem('silver_auth');window.location.reload();}}>Выйти</button>
    </div>
  </>;
}

function App() {
  const [auth,setAuth]=useState(!!sessionStorage.getItem('silver_auth'));
  if(!auth) return <LoginScreen onLogin={()=>setAuth(true)}/>;
  return <Dashboard/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
